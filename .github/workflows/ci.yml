name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  SBCL_VERSION: '2.5.9'

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            sbcl_arch: x86-64-linux
          - os: macos-latest
            sbcl_arch: arm64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          curl -fsSL -o sbcl.tar.bz2 \
            "https://downloads.sourceforge.net/project/sbcl/sbcl/${{ env.SBCL_VERSION }}/sbcl-${{ env.SBCL_VERSION }}-${{ matrix.sbcl_arch }}-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-${{ env.SBCL_VERSION }}-${{ matrix.sbcl_arch }}
          sudo bash install.sh
          sbcl --version

      - name: Install ocicl (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/ocicl/ocicl/releases/latest/download/ocicl_2.14.1-1_amd64.deb
          sudo apt install -y ./ocicl_2.14.1-1_amd64.deb
          ocicl setup

      - name: Install ocicl (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ocicl
          ocicl setup

      - name: Install dependencies
        run: ocicl install

      - name: Run tests
        run: make test

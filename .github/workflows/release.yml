name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: hemlock-Linux-x86_64.tar.gz
            webui-zip: webui-linux-gcc-x64.zip
            webui-dir: webui-linux-gcc-x64
            webui-lib: libwebui-2.so
          - os: macos-latest
            artifact: hemlock-Darwin-arm64.tar.gz
            webui-zip: webui-macos-clang-arm64.zip
            webui-dir: webui-macos-clang-arm64
            webui-lib: libwebui-2.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o sbcl.tar.bz2 \
            "https://downloads.sourceforge.net/project/sbcl/sbcl/2.5.9/sbcl-2.5.9-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-2.5.9-x86-64-linux
          sudo bash install.sh

      - name: Install SBCL (macOS)
        if: runner.os == 'macOS'
        run: brew install sbcl

      - name: Install ocicl (Linux)
        if: runner.os == 'Linux'
        run: |
          OCICL_VERSION=$(curl -sI https://github.com/ocicl/ocicl/releases/latest | grep -i ^location | sed 's|.*/v||;s/\r//')
          wget -q "https://github.com/ocicl/ocicl/releases/download/v${OCICL_VERSION}/ocicl_${OCICL_VERSION}-1_amd64.deb"
          sudo apt install -y ./ocicl_${OCICL_VERSION}-1_amd64.deb
          ocicl setup

      - name: Install ocicl (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ocicl
          ocicl setup

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libtree-sitter-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install tree-sitter

      - name: Install libwebui-2
        run: |
          curl -fsSL -o webui.zip \
            "https://github.com/webui-dev/webui/releases/download/nightly/${{ matrix.webui-zip }}"
          unzip -q webui.zip
          sudo mkdir -p /usr/local/lib
          sudo cp ${{ matrix.webui-dir }}/${{ matrix.webui-lib }} /usr/local/lib/

      - name: Install dependencies
        run: ocicl install

      - name: Vendor submodules
        run: make vendor

      - name: Build
        run: make build
        env:
          LD_LIBRARY_PATH: /usr/local/lib

      - name: Package
        run: tar czf ${{ matrix.artifact }} -C bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hemlock-Linux-x86_64.tar.gz/hemlock-Linux-x86_64.tar.gz
            hemlock-Darwin-arm64.tar.gz/hemlock-Darwin-arm64.tar.gz

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: hemlock-Linux-x86_64.tar.gz
          - os: macos-latest
            artifact: hemlock-Darwin-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o sbcl.tar.bz2 \
            "https://downloads.sourceforge.net/project/sbcl/sbcl/2.5.9/sbcl-2.5.9-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-2.5.9-x86-64-linux
          sudo bash install.sh

      - name: Install SBCL (macOS)
        if: runner.os == 'macOS'
        run: brew install sbcl

      - name: Install ocicl (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/ocicl/ocicl/releases/latest/download/ocicl_2.14.1-1_amd64.deb
          sudo apt install -y ./ocicl_2.14.1-1_amd64.deb
          ocicl setup

      - name: Install ocicl (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ocicl
          ocicl setup

      - name: Install dependencies
        run: ocicl install

      - name: Build
        run: make build

      - name: Package
        run: tar czf ${{ matrix.artifact }} -C bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hemlock-Linux-x86_64.tar.gz/hemlock-Linux-x86_64.tar.gz
            hemlock-Darwin-arm64.tar.gz/hemlock-Darwin-arm64.tar.gz

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  SBCL_VERSION: '2.5.9'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: hemlock-Linux-x86_64.tar.gz
          - os: macos-latest
            artifact: hemlock-Darwin-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Roswell
        uses: 40ants/setup-lisp@v4
        with:
          lisp: sbcl-bin/${{ env.SBCL_VERSION }}

      - name: Install ocicl
        run: curl -sL https://raw.githubusercontent.com/ocicl/ocicl/main/install.sh | bash

      - name: Install dependencies
        run: ocicl install

      - name: Build
        run: make build

      - name: Package
        run: tar czf ${{ matrix.artifact }} -C bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hemlock-Linux-x86_64.tar.gz/hemlock-Linux-x86_64.tar.gz
            hemlock-Darwin-arm64.tar.gz/hemlock-Darwin-arm64.tar.gz
